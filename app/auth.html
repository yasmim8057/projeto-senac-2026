<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <div class="container">
        <form id="auth">
            <label for="email"> Email: </label>
            <input id="email" type="email" name="email" placeholder="joao.silva@example.com">

            <label for="senha"> Password: </label>
            <input id="senha" type="password" name="senha" placeholder="Senha">
            
            <p id="error-message" style="color: red; font-size: 0.9em;"></p>

            <button type="submit"> Fazer Login </button>
        </form>
    </div>
</body>

</html>
