<!DOCTYPE html5>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viajei: Sobre</title>
  <link rel="stylesheet" href="./style/form.css">
  <script type="module" src="./scripts/form.js"></script>
</head>

<body>
  <div id="container">
    <header>
      <nav>
        <img src="./images/boat.png"
          alt="Uma imagem de um barco a vela, somente com traços em tons marrons. O barco está de com a proa virada para o lado direito" />
        <div class="toggle"></div>
        <a class="link-do-cabecalho" href="./index.html">Viajei</a>
        <a class="link-do-cabecalho" href="./about.html">Sobre</a>
        <a class="link-do-cabecalho" href="./form.html">Fofoca?!</a>
      </nav>
    </header>
    
    <main>
      <form id="post-form">
        <label for="autor"> Autor (ex.: João da Silva): </label>
        <input id="autor" type="text" name="autor" placeholder="João da Silva">

        <label for="titulo"> Título da história: </label>
        <input id="titulo" type="text" name="titulo" placeholder="A vida é carnaval">

        <label for="email"> Email: </label>
        <input id="email" type="email" name="email" placeholder="joao.silva@example.com">

        <label for="historia"> História: </label>
        <textarea id="historia" cols="50" rows="20" name="historia" placeholder="Meu coração é carnaval"></textarea>

        <button type="submit"> Enviar </button>

      </form>
      <div id="historias">
      </div>
    </main>
    <dialog id="modal">
      <button autofocus> X </button>
      <div id="modal-content"></div>
    </dialog>





  </div>
</body>

</html>
